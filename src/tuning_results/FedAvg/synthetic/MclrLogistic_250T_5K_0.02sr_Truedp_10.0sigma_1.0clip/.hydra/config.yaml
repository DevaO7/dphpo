dataset:
  name: synthetic
  model_name: MclrLogistic
  nb_users: 100
  same_sample_size: true
  num_samples: 5000
  dim_input: 40
  dim_output: 10
  dim_pca: None
  noise_ratio: 0.05
  alpha: 0.0
  beta: 0.0
  ratio_training: 0.8
  number: 2
  max_data_feature_norm: 2.0
  seed_user: 0
  standardize: false
  iid: true
  path: ./src/data/synthetic/data
  batch_size: 400
  loss_fn: NLLLoss
  x_label: x
  y_label: 'y'
run_mode:
  generate_data: false
  find_optimum: false
  tune_hyperparameter: true
  compile_tuning_results: false
  simulate: false
  compile_results: false
run_settings:
  rounds: 250
  algorithm: FedAvg
  seed: 0
  use_cuda: true
  visualize_data_partition: true
tuning:
  cross_validation: true
  cv_folds: 1
  hyperparameter_grid:
  - 0.32
  save_path: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip
server:
  constant_global_step: false
  client_ratio: 0.05
  local_updates: 5
  weight_decay: 0.0
  sampling_rate: 0.02
  dp: true
  sigma: 10.0
  max_grad_norm: 1.0
