dataset:
  name: ylecun/mnist
  model_name: cnn_mnist
  nb_users: 40
  batch_size: 1000
  partitioner_name: IidPartitioner
  partitioner_parameter: null
  dim_output: 10
  similarity: iid
  x_label: image
  y_label: label
  loss_fn: CrossEntropyLoss
  max_samples_per_client: 2500
run_mode:
  generate_data: false
  find_optimum: false
  tune_hyperparameter: false
  compile_tuning_results: true
  simulate: false
  compile_results: false
run_settings:
  rounds: 250
  algorithm: FedAvg
  seed: 0
  use_cuda: true
  visualize_data_partition: false
tuning:
  cross_validation: true
  cv_folds: 1
  hyperparameter_grid:
  - 0.01
  - 0.02
  save_path: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip
server:
  constant_global_step: false
  client_ratio: 0.06
  local_updates: 5
  weight_decay: 0.0
  sampling_rate: 0.02
  dp: false
  sigma: 10.0
  max_grad_norm: 1.0
results:
  client_ratio_vs_beta: false
