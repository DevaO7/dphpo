dataset:
  name: mnist
  model_name: cnn_mnist
  nb_users: 40
  batch_size: 500
  distribution_name: iid
  distribution_parameter: 0.0
  dim_output: 10
  similarity: None
run_mode:
  generate_data: false
  find_optimum: false
  tune_hyperparameter: true
  compile_tuning_results: false
  simulate: false
  compile_results: false
run_settings:
  rounds: 250
  algorithm: FedAvg
  batch_size: 400
  seed: 0
  use_cuda: true
  loss_function: NLLLoss
tuning:
  cross_validation: true
  cv_folds: 1
  hyperparameter_grid:
  - 1000
  save_path: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip
server:
  constant_global_step: false
  client_ratio: 0.02
  local_updates: 5
  weight_decay: 0.0
  sampling_rate: 0.2
  dp: true
  sigma: 0.1
  max_grad_norm: 1.0
