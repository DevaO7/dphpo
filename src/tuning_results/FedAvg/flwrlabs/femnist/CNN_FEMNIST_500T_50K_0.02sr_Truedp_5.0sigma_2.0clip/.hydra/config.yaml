dataset:
  name: flwrlabs/femnist
  model_name: CNN_FEMNIST
  nb_users: 40
  batch_size: 200
  partitioner_name: IidPartitioner
  partitioner_parameter: null
  dim_output: 62
  similarity: iid
  x_label: image
  y_label: character
  loss_fn: CrossEntropyLoss
  max_samples_per_client: 2500
run_mode:
  generate_data: false
  find_optimum: false
  tune_hyperparameter: true
  compile_tuning_results: false
  simulate: false
  compile_results: false
run_settings:
  rounds: 500
  algorithm: FedAvg
  seed: 0
  use_cuda: true
  visualize_data_partition: false
tuning:
  cross_validation: true
  cv_folds: 1
  hyperparameter_grid:
  - 0.16
  save_path: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip
server:
  constant_global_step: false
  client_ratio: 0.04
  local_updates: 50
  weight_decay: 0.0
  sampling_rate: 0.02
  dp: true
  sigma: 5.0
  max_grad_norm: 2.0
results:
  client_ratio_vs_beta: false
  client_ratios:
  - 0.02
  - 0.04
  - 0.06
  - 0.08
  - 0.1
  - 0.13
  - 0.15
  - 0.17
  - 0.21
