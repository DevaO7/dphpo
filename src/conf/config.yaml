defaults:
  - dataset: femnist
  - _self_

hydra:
  run:
    dir: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip_constant_global_step_${server.constant_global_step}

run_mode:
  generate_data: False
  find_optimum: False
  tune_hyperparameter: False
  compile_tuning_results: False
  simulate: False
  compile_results: False

run_settings:
  rounds: 500
  algorithm: FedAvg
  seed: 0
  use_cuda: True
  visualize_data_partition: False
  resume_from_checkpoint: False

tuning:
  cross_validation: True
  cv_folds: 1
  hyperparameter_grid: []
  save_path: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip_constant_global_step_${server.constant_global_step}

server:
  constant_global_step: False
  global_step_size: 1.0
  client_ratio: 0.2
  local_updates: 50
  weight_decay: 0.0
  sampling_rate: 0.2
  dp: True
  sigma: 5.0
  max_grad_norm: 2.0

results:
  client_ratio_vs_beta: False
  client_ratios: [0.02,0.04,0.06,0.08,0.1,0.13,0.15,0.17,0.21]

  # [0.1, 0.2, 0.4, 0.8, 1.6, 3.2, 6.4, 12.8]
  # [0.04, 0.08, 0.16, 0.32, 0.64, 1.28, 2.56, 5.12]