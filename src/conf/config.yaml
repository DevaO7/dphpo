defaults:
  - dataset: synthetic
  - _self_

hydra:
  run:
    dir: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip

run_mode:
  generate_data: False
  find_optimum: False
  tune_hyperparameter: True
  compile_tuning_results: False
  simulate: False
  compile_results: False

run_settings:
  rounds: 250
  algorithm: FedAvg
  batch_size: 400
  seed: 0
  use_cuda: True
  loss_function: NLLLoss

tuning:
  cross_validation: True
  cv_folds: 1
  hyperparameter_grid: [0.1, 0.2, 0.4, 0.8]
  save_path: tuning_results/${run_settings.algorithm}/${dataset.name}/${dataset.model_name}_${run_settings.rounds}T_${server.local_updates}K_${server.sampling_rate}sr_${server.dp}dp_${server.sigma}sigma_${server.max_grad_norm}clip

server:
  constant_global_step: False
  client_ratio: 0.02
  local_updates: 5
  weight_decay: 0.0
  sampling_rate: 0.2
  dp: True
  sigma: 0.1
  max_grad_norm: 1.0